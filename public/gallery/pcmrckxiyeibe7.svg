<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a3a;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#1a0a2a;stop-opacity:1"></stop>
    </linearGradient>
    
    <radialGradient id="softEdge1" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#8b6f9e;stop-opacity:0.9"></stop>
      <stop offset="70%" style="stop-color:#6b4f7e;stop-opacity:0.6"></stop>
      <stop offset="100%" style="stop-color:#3b1f4e;stop-opacity:0.1"></stop>
    </radialGradient>
    
    <radialGradient id="softEdge2" cx="70%" cy="60%" r="65%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:0.85"></stop>
      <stop offset="60%" style="stop-color:#b8855a;stop-opacity:0.5"></stop>
      <stop offset="100%" style="stop-color:#7a5a3a;stop-opacity:0.05"></stop>
    </radialGradient>
    
    <radialGradient id="softEdge3" cx="50%" cy="20%" r="80%">
      <stop offset="0%" style="stop-color:#a8c5d1;stop-opacity:0.8"></stop>
      <stop offset="50%" style="stop-color:#7a9aad;stop-opacity:0.4"></stop>
      <stop offset="100%" style="stop-color:#4a6a7d;stop-opacity:0.02"></stop>
    </radialGradient>
    
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"></feGaussianBlur>
    </filter>
    
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"></feGaussianBlur>
    </filter>
  </defs>
  
  
  <rect width="1000" height="1000" fill="url(#grad1)"></rect>
  
  
  <g filter="url(#blur1)">
    <rect x="50" y="80" width="520" height="480" fill="url(#softEdge1)" rx="15" ry="15"></rect>
    <ellipse cx="180" cy="150" rx="280" ry="320" fill="url(#softEdge1)" opacity="0.6"></ellipse>
    <path d="M 80 100 Q 150 80 280 120 Q 320 140 350 200 L 340 480 Q 280 500 150 510 Q 80 505 60 450 Z" fill="url(#softEdge1)" opacity="0.4"></path>
  </g>
  
  
  <g filter="url(#blur2)">
    <rect x="480" y="520" width="480" height="420" fill="url(#softEdge2)" rx="12" ry="12"></rect>
    <ellipse cx="720" cy="680" rx="300" ry="280" fill="url(#softEdge2)" opacity="0.65"></ellipse>
    <path d="M 510 540 Q 600 520 750 540 Q 850 560 920 620 L 930 900 Q 820 920 650 925 Q 520 920 490 850 Z" fill="url(#softEdge2)" opacity="0.5"></path>
  </g>
  
  
  <g filter="url(#blur1)">
    <rect x="600" y="120" width="380" height="340" fill="url(#softEdge3)" rx="18" ry="18"></rect>
    <ellipse cx="820" cy="200" rx="220" ry="240" fill="url(#softEdge3)" opacity="0.7"></ellipse>
    <path d="M 620 140 Q 700 100 820 110 Q 900 125 950 180 L 960 420 Q 880 450 710 455 Q 610 445 600 380 Z" fill="url(#softEdge3)" opacity="0.45"></path>
  </g>
  
  
  <circle cx="300" cy="280" r="120" fill="url(#softEdge1)" opacity="0.25" filter="url(#blur2)"></circle>
  <circle cx="750" cy="750" r="140" fill="url(#softEdge2)" opacity="0.2" filter="url(#blur2)"></circle>
  <circle cx="850" cy="250" r="100" fill="url(#softEdge3)" opacity="0.3" filter="url(#blur1)"></circle>
  
  
  <line x1="500" y1="200" x2="500" y2="800" stroke="#5a3a6a" stroke-width="1" opacity="0.15"></line>
  <line x1="200" y1="500" x2="800" y2="500" stroke="#8a6a9a" stroke-width="0.8" opacity="0.1"></line>
  
  
  <ellipse cx="400" cy="600" rx="180" ry="150" fill="url(#softEdge2)" opacity="0.15" filter="url(#blur2)"></ellipse>
  <ellipse cx="650" cy="350" rx="160" ry="200" fill="url(#softEdge1)" opacity="0.18" filter="url(#blur1)"></ellipse>
  
  
  <rect x="200" y="250" width="300" height="250" fill="url(#softEdge1)" opacity="0.08" filter="url(#blur2)"></rect>
  <rect x="600" y="600" width="320" height="280" fill="url(#softEdge2)" opacity="0.12" filter="url(#blur2)"></rect>
</svg>