<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf3f0;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#e8d4f8;stop-opacity:1"></stop>
    </linearGradient>
    <radialGradient id="grad2" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#fff9e6;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#f0d4e6;stop-opacity:0.8"></stop>
    </radialGradient>
    <radialGradient id="grad3" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#2a1a3d;stop-opacity:0.6"></stop>
      <stop offset="100%" style="stop-color:#1a0f2e;stop-opacity:1"></stop>
    </radialGradient>
    <linearGradient id="iridescent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a3f7f;stop-opacity:0.7"></stop>
      <stop offset="50%" style="stop-color:#2d5a7b;stop-opacity:0.8"></stop>
      <stop offset="100%" style="stop-color:#1a4d3e;stop-opacity:0.7"></stop>
    </linearGradient>
  </defs>

  
  <rect width="1000" height="1000" fill="url(#grad1)"></rect>

  
  <g id="mandala" transform="translate(500, 500)">
    
    
    <g id="petal-ring">
      <ellipse cx="0" cy="-220" rx="45" ry="95" fill="#f5c5d8" opacity="0.9"></ellipse>
      <ellipse cx="155" cy="-155" rx="40" ry="90" fill="#f5d4a6" opacity="0.85"></ellipse>
      <ellipse cx="220" cy="0" rx="45" ry="90" fill="#e8c9f0" opacity="0.9"></ellipse>
      <ellipse cx="155" cy="155" rx="40" ry="85" fill="#f5c5d8" opacity="0.88"></ellipse>
      <ellipse cx="0" cy="220" rx="48" ry="95" fill="#f5d4a6" opacity="0.85"></ellipse>
      <ellipse cx="-155" cy="155" rx="42" ry="88" fill="#e8c9f0" opacity="0.87"></ellipse>
      <ellipse cx="-220" cy="0" rx="46" ry="92" fill="#f5c5d8" opacity="0.89"></ellipse>
      <ellipse cx="-155" cy="-155" rx="41" ry="87" fill="#f0d8e6" opacity="0.86"></ellipse>
    </g>

    
    <g id="rupture">
      <path d="M -80 -120 Q -100 -80 -95 -40 L -130 -60 Q -115 -95 -80 -120" fill="url(#iridescent)" opacity="0.75"></path>
      <path d="M -95 -40 Q -90 0 -100 40 L -140 20 Q -135 -20 -130 -60 Z" fill="#3d2f5f" opacity="0.65"></path>
      <circle cx="-110" cy="-20" r="25" fill="#4a3f7f" opacity="0.7"></circle>
      <circle cx="-110" cy="-20" r="18" fill="#2d5a7b" opacity="0.6"></circle>
    </g>

    
    <path d="M 40 -180 Q 60 -140 55 -100 Q 50 -60 65 -20" stroke="#d4a8e8" stroke-width="3" fill="none" opacity="0.8"></path>
    <path d="M 40 -180 Q 30 -150 45 -110" stroke="#fff9e6" stroke-width="1.5" fill="none" opacity="0.6"></path>
    
    
    <g id="secondary-rupture">
      <path d="M 140 -140 L 200 -180 L 210 -130 L 180 -100 Z" fill="url(#iridescent)" opacity="0.68"></path>
      <circle cx="180" cy="-130" r="20" fill="#1a4d3e" opacity="0.55"></circle>
      <path d="M 180 -130 L 160 -115 L 175 -110" fill="#2d5a7b" opacity="0.6"></path>
    </g>

    
    <circle cx="0" cy="0" r="140" fill="none" stroke="#e8c9f0" stroke-width="2" opacity="0.7"></circle>
    <circle cx="0" cy="0" r="110" fill="none" stroke="#f5d4a6" stroke-width="2.5" opacity="0.8"></circle>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#f0d8e6" stroke-width="2" opacity="0.75"></circle>
    
    
    <path d="M 0 -80 Q 25 -50 35 -15 Q 30 20 15 50" stroke="#d4a8e8" stroke-width="1.5" fill="none" opacity="0.6"></path>
    <path d="M 0 -80 Q -30 -45 -40 -10 Q -35 30 -15 60" stroke="#e8c9f0" stroke-width="1.2" fill="none" opacity="0.5"></path>
    <path d="M -70 -40 Q -50 -20 -30 0 Q -15 25 0 45" stroke="#f5c5d8" stroke-width="1.5" fill="none" opacity="0.55"></path>
    <path d="M 70 -35 Q 50 -15 35 5 Q 20 35 10 60" stroke="#f0d8e6" stroke-width="1.3" fill="none" opacity="0.52"></path>

    
    <circle cx="0" cy="0" r="50" fill="url(#grad2)" opacity="0.95"></circle>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#e8c9f0" stroke-width="1.5" opacity="0.8"></circle>
    <circle cx="0" cy="0" r="30" fill="#fff9e6" opacity="0.85"></circle>
    
    
    <circle cx="0" cy="0" r="20" fill="url(#grad3)" opacity="0.8"></circle>
    <circle cx="-6" cy="-5" r="8" fill="#2d5a7b" opacity="0.7"></circle>
    <circle cx="5" cy="6" r="6" fill="#4a3f7f" opacity="0.65"></circle>

    
    <circle cx="25" cy="-18" r="5" fill="#f5c5d8" opacity="0.7"></circle>
    <circle cx="-22" cy="20" r="4" fill="#e8c9f0" opacity="0.65"></circle>
    <circle cx="15" cy="25" r="4.5" fill="#f5d4a6" opacity="0.68"></circle>
    <circle cx="-28" cy="-10" r="5" fill="#f0d8e6" opacity="0.72"></circle>
  </g>

  
  <g id="floating-elements">
    
    <path d="M 150 120 Q 140 100 160 85 Q 180 95 170 115 Z" fill="url(#iridescent)" opacity="0.6"></path>
    <circle cx="160" cy="100" r="12" fill="#1a4d3e" opacity="0.5"></circle>

    
    <path d="M 800 350 L 850 320 L 870 360 L 820 380 Z" fill="#3d2f5f" opacity="0.55"></path>
    <circle cx="830" cy="350" r="18" fill="#2d5a7b" opacity="0.6"></circle>
    <path d="M 830 350 L 815 340 L 825 335" stroke="#4a3f7f" stroke-width="1.5" fill="none" opacity="0.65"></path>

    
    <path d="M 250 800 Q 270 820 280 850 Q 260 860 240 840 Q 235 820 250 800" fill="url(#iridescent)" opacity="0.58"></path>
    <circle cx="260" cy="830" r="15" fill="#1a4d3e" opacity="0.55"></circle>

    
    <polygon points="850,100 900,80 920,120 880,140" fill="#4a3f7f" opacity="0.52"></polygon>
    <circle cx="885" cy="105" r="14" fill="#2d5a7b" opacity="0.58"></circle>
  </g>

  
  <g id="tension-lines" opacity="0.4">
    <path d="M 200 150 Q 300 200 400 180" stroke="#d4a8e8" stroke-width="1" fill="none"></path>
    <path d="M 750 250 Q 700 350 650 400" stroke="#e8c9f0" stroke-width="1.2" fill="none"></path>
    <path d="M 300 700 Q 400 750 500 720" stroke="#f5c5d8" stroke-width="0.9" fill="none"></path>
  </g>

  
  <circle cx="180" cy="180" r="3" fill="#fff9e6" opacity="0.8"></circle>
  <circle cx="750" cy="200" r="2.5" fill="#f0d8e6" opacity="0.75"></circle>
  <circle cx="300" cy="850" r="3.5" fill="#e8c9f0" opacity="0.7"></circle>
  <circle cx="820" cy="750" r="2" fill="#f5d4a6" opacity="0.72"></circle>
</svg>